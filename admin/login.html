<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login - Duct Cleaning Nassau County</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-body: #030918;
      --bg-surface: #0D1735;
      --bg-elevated: #081028;
      --accent: #38BDF8;
      --accent-hover: #0EA5E9;
      --text: #E2E8F0;
      --text-light: #94A3B8;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.10);
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header img {
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 6px;
    }

    .login-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .login-header p {
      font-size: 14px;
      color: var(--text-light);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #030918;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-login:hover {
      background: var(--accent-hover);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-light);
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-header">
      <img src="../images/logo-bg.png" alt="Duct Cleaning Nassau County Logo">
      <h1>Admin Panel</h1>
      <p>Sign in to manage your business</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="Enter password">
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
    </form>

    <p class="back-link"><a href="/">&larr; Back to website</a></p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script>
    // If already logged in, go to dashboard
    AUTH.redirectIfLoggedIn();

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const btnLogin = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnLogin.disabled = true;
      btnLogin.textContent = 'Signing in...';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        await AUTH.login(email, password);
        window.location.href = AUTH.dashboardPage;
      } catch (err) {
        errorMsg.textContent = 'Invalid email or password. Please try again.';
        errorMsg.style.display = 'block';
        btnLogin.disabled = false;
        btnLogin.textContent = 'Sign In';
      }
    });
  </script>

</html>
