<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Create Invoice - Duct Cleaning Nassau County</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-body: #030918;
      --bg-surface: #0D1735;
      --bg-elevated: #081028;
      --bg-surface-hover: #132148;
      --accent: #38BDF8;
      --accent-hover: #0EA5E9;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --teal: #2DD4BF;
      --text: #E2E8F0;
      --text-light: #94A3B8;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.10);
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-body);
      color: var(--text);
      min-height: 100vh;
    }

    /* Top bar */
    .topbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-light);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-left a {
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }

    .topbar-left a:hover { color: var(--accent); }

    .topbar-left h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .topbar-actions {
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 8px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #030918;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-success {
      background: var(--teal);
      color: #030918;
    }

    .btn-success:hover { background: #14b8a6; }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Main */
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Form sections */
    .form-section {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-section h2 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 9px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.12);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* Line items table */
    .line-items-table {
      width: 100%;
      border-collapse: collapse;
    }

    .line-items-table thead th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-light);
      font-weight: 600;
      padding: 6px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    .line-items-table thead th.r { text-align: right; }
    .line-items-table thead th.c { text-align: center; }

    .line-items-table tbody td {
      padding: 6px 4px;
      vertical-align: middle;
    }

    .line-items-table tbody td.r { text-align: right; font-weight: 600; font-size: 13px; }

    .inv-input {
      width: 100%;
      padding: 7px 8px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
    }

    .inv-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .inv-input-desc { min-width: 200px; }
    .inv-input-sm { width: 80px; text-align: right; }

    .btn-add-line {
      margin-top: 10px;
      background: transparent;
      border: 1px dashed var(--border-light);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      transition: all 0.2s;
    }

    .btn-add-line:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .btn-remove-line {
      background: none;
      border: none;
      color: #EF4444;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .btn-remove-line:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    /* Tax selector */
    .tax-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 12px;
      background: var(--bg-elevated);
      border-radius: 6px;
    }

    .tax-row label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
    }

    .tax-row select,
    .tax-row input {
      padding: 6px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }

    .tax-row input { width: 80px; text-align: right; }

    /* Totals block */
    .totals-block {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .totals-grid {
      min-width: 280px;
    }

    .totals-grid .total-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .totals-grid .total-row .label {
      color: var(--text-light);
      font-weight: 600;
    }

    .totals-grid .total-row .value {
      font-weight: 600;
      color: var(--text);
    }

    .totals-grid .total-row.grand {
      border-top: 2px solid var(--accent);
      margin-top: 4px;
      padding-top: 10px;
    }

    .totals-grid .total-row.grand .label,
    .totals-grid .total-row.grand .value {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }

    /* Messages */
    .msg {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .msg-success {
      background: rgba(45, 212, 191, 0.15);
      border: 1px solid rgba(45, 212, 191, 0.3);
      color: var(--teal);
    }

    .msg-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-body);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 700px) {
      .main { padding: 14px; }
      .form-section { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .inv-input-desc { min-width: auto; }
      .line-items-table { font-size: 11px; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html">&larr; Dashboard</a>
      <h1>Create Invoice</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary" id="btnPreview">Preview</button>
      <button class="btn btn-success" id="btnSave">Save Invoice</button>
    </div>
  </div>

  <div class="main">
    <div class="msg msg-success" id="msgSuccess"></div>
    <div class="msg msg-error" id="msgError"></div>

    <!-- Invoice details -->
    <div class="form-section">
      <h2>Invoice Details</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="invoiceNumber">Invoice #</label>
          <input type="text" id="invoiceNumber" placeholder="0001" readonly>
        </div>
        <div class="form-group">
          <label for="dateIssued">Date Issued</label>
          <input type="date" id="dateIssued">
        </div>
        <div class="form-group">
          <label for="invoiceType">Type</label>
          <select id="invoiceType">
            <option value="invoice">Invoice</option>
            <option value="estimate">Estimate</option>
          </select>
        </div>
        <div class="form-group">
          <label for="invoiceStatus">Status</label>
          <select id="invoiceStatus">
            <option value="pending">Pending</option>
            <option value="paid">Paid</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Customer info -->
    <div class="form-section">
      <h2>Customer Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label for="customerName">Full Name</label>
          <input type="text" id="customerName" placeholder="John Smith" required>
        </div>
        <div class="form-group">
          <label for="customerPhone">Phone</label>
          <input type="tel" id="customerPhone" placeholder="(516) 000-0000">
        </div>
        <div class="form-group">
          <label for="customerEmail">Email</label>
          <input type="email" id="customerEmail" placeholder="john@email.com">
        </div>
      </div>
    </div>

    <!-- Job location -->
    <div class="form-section">
      <h2>Job Location</h2>
      <div class="form-row">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label for="jobAddress">Address</label>
          <input type="text" id="jobAddress" placeholder="123 Main St">
        </div>
      </div>
      <div class="form-row" style="margin-top: 10px;">
        <div class="form-group">
          <label for="jobCity">City</label>
          <input type="text" id="jobCity" placeholder="Oceanside">
        </div>
        <div class="form-group">
          <label for="jobState">State</label>
          <input type="text" id="jobState" value="NY" maxlength="2">
        </div>
        <div class="form-group">
          <label for="jobZip">Zip Code</label>
          <input type="text" id="jobZip" placeholder="11572" maxlength="10">
        </div>
      </div>
    </div>

    <!-- Line items -->
    <div class="form-section">
      <h2>Services / Line Items</h2>
      <table class="line-items-table">
        <thead>
          <tr>
            <th style="width: 30px;">#</th>
            <th>Description</th>
            <th style="width: 70px;">Qty</th>
            <th class="r" style="width: 90px;">Price</th>
            <th class="r" style="width: 90px;">Discount</th>
            <th class="c" style="width: 50px;">Tax</th>
            <th class="r" style="width: 100px;">Total</th>
            <th style="width: 36px;"></th>
          </tr>
        </thead>
        <tbody id="lineItemsBody"></tbody>
      </table>
      <button class="btn-add-line" onclick="InvoiceManager.addLineItem()">+ Add Line Item</button>

      <!-- Tax rate selector -->
      <div class="tax-row">
        <label>Tax Rate:</label>
        <select id="taxRateSelect" onchange="handleTaxChange()">
          <option value="8.875">8.875% (NY Default)</option>
          <option value="0">No Tax (0%)</option>
          <option value="custom">Custom Rate</option>
        </select>
        <input type="number" id="customTaxInput" step="0.001" min="0" max="100"
          placeholder="%" style="display: none;"
          onchange="InvoiceManager.setTaxRate(this.value)">
      </div>

      <!-- Global discount -->
      <div class="tax-row" style="margin-top: 8px;">
        <label>Global Discount ($):</label>
        <input type="number" id="globalDiscount" step="0.01" min="0" value="0"
          onchange="InvoiceManager.setDiscount(this.value)">
      </div>

      <!-- Payment method -->
      <div class="tax-row" style="margin-top: 8px;">
        <label>Payment Method:</label>
        <select id="paymentMethod">
          <option value="">Select...</option>
          <option value="cash">Cash</option>
          <option value="check">Check</option>
          <option value="credit_card">Credit Card</option>
          <option value="zelle">Zelle</option>
        </select>
      </div>

      <!-- Totals -->
      <div class="totals-block">
        <div class="totals-grid">
          <div class="total-row">
            <span class="label">Subtotal</span>
            <span class="value" id="subtotalDisplay">$0.00</span>
          </div>
          <div class="total-row">
            <span class="label">Tax (<span id="taxRateDisplay">8.875%</span>)</span>
            <span class="value" id="taxAmountDisplay">$0.00</span>
          </div>
          <div class="total-row">
            <span class="label">Discount</span>
            <span class="value" id="discountDisplay">-$0.00</span>
          </div>
          <div class="total-row grand">
            <span class="label">Total</span>
            <span class="value" id="grandTotalDisplay">$0.00</span>
          </div>
          <div class="total-row">
            <span class="label">Balance Due</span>
            <span class="value" id="balanceDueDisplay">$0.00</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <h2>Notes / Message</h2>
      <div class="form-group">
        <textarea id="invoiceNotes" placeholder="Thank you for your business."></textarea>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/invoice.js?v=3"></script>
  <script>
    (async function init() {
      const user = await AUTH.requireAuth();
      if (!user) return;
      document.getElementById('loadingOverlay').classList.add('hidden');

      // Set today's date
      document.getElementById('dateIssued').value = new Date().toISOString().split('T')[0];

      // Get next invoice number
      const nextNum = await InvoiceManager.getNextInvoiceNumber();
      document.getElementById('invoiceNumber').value = nextNum;

      // Start with one empty line
      InvoiceManager.addLineItem();
    })();

    // Tax rate change handler
    function handleTaxChange() {
      const sel = document.getElementById('taxRateSelect');
      const customInput = document.getElementById('customTaxInput');
      if (sel.value === 'custom') {
        customInput.style.display = 'inline-block';
        customInput.focus();
      } else {
        customInput.style.display = 'none';
        InvoiceManager.setTaxRate(sel.value);
      }
    }

    // Collect form data
    function getFormData() {
      return {
        invoiceNumber: document.getElementById('invoiceNumber').value,
        dateIssued: document.getElementById('dateIssued').value,
        type: document.getElementById('invoiceType').value,
        status: document.getElementById('invoiceStatus').value,
        customerName: document.getElementById('customerName').value.trim(),
        customerPhone: document.getElementById('customerPhone').value.trim(),
        customerEmail: document.getElementById('customerEmail').value.trim(),
        jobAddress: document.getElementById('jobAddress').value.trim(),
        jobCity: document.getElementById('jobCity').value.trim(),
        jobState: document.getElementById('jobState').value.trim(),
        jobZip: document.getElementById('jobZip').value.trim(),
        paymentMethod: document.getElementById('paymentMethod').value,
        notes: document.getElementById('invoiceNotes').value.trim()
      };
    }

    // Save
    document.getElementById('btnSave').addEventListener('click', async () => {
      const btn = document.getElementById('btnSave');
      const msgSuccess = document.getElementById('msgSuccess');
      const msgError = document.getElementById('msgError');
      msgSuccess.style.display = 'none';
      msgError.style.display = 'none';

      const formData = getFormData();
      if (!formData.customerName) {
        msgError.textContent = 'Please enter a customer name.';
        msgError.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      if (InvoiceManager.lineItems.length === 0 || !InvoiceManager.lineItems.some(i => i.description.trim())) {
        msgError.textContent = 'Please add at least one service line item.';
        msgError.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const invoice = await InvoiceManager.save(formData);
        msgSuccess.textContent = `Invoice #${formData.invoiceNumber} saved successfully!`;
        msgSuccess.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Redirect to preview after short delay
        setTimeout(() => {
          window.location.href = `invoice-preview.html?id=${invoice.id}`;
        }, 1000);
      } catch (err) {
        msgError.textContent = 'Error saving invoice: ' + err.message;
        msgError.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        btn.disabled = false;
        btn.textContent = 'Save Invoice';
      }
    });

    // Preview (opens in new tab with current data)
    document.getElementById('btnPreview').addEventListener('click', () => {
      const formData = getFormData();
      const totals = InvoiceManager.recalculate();
      const previewData = {
        formData,
        lineItems: InvoiceManager.lineItems,
        taxRate: InvoiceManager.taxRate,
        totals
      };
      // Store in sessionStorage for preview page
      sessionStorage.setItem('invoicePreview', JSON.stringify(previewData));
      window.open('invoice-preview.html?preview=true', '_blank');
    });
  </script>
